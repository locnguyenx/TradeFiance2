apply plugin: 'groovy'

// ABOUTME: build.gradle for TradeFinance component to enable automated Spock testing.

repositories {
    flatDir name: 'localLib', dirs: project.parent.project(':framework').projectDir.absolutePath + '/lib'
    mavenCentral()
}

dependencies {
    implementation project(':framework')
    implementation 'org.apache.groovy:groovy:5.0.3'
    
    testImplementation project(':framework')
    testImplementation platform('org.spockframework:spock-bom:2.4-groovy-5.0')
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'org.spockframework:spock-junit4'
    testImplementation 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.junit.platform:junit-platform-suite'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:6.0.1'
    testImplementation 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

test {
    useJUnitPlatform()
    testLogging { events "passed", "skipped", "failed" }
    
    systemProperty 'moqui.runtime', projectDir.parentFile.parentFile.absolutePath
    systemProperty 'moqui.conf', 'conf/MoquiDevConf.xml'
    systemProperty 'moqui.init.static', 'true'
}
